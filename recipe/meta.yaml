{% set name = "yaqd-gage" %}
{% set version = "2026.1.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 018bc346d9bd0116601296e69c81eeda1f6eca76192033cc75efa674994fa1f9

build:
  number: 0
  noarch: python
  entry_points:
    - yaqd-gage-compuscope = yaqd_gage._compuscope:CompuScope.main
    - yaqd-gage-chopping = yaqd_gage._chopping:CompuScope.main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - yaqd-core >=2020.06.3
    - pip
    - flit
  run:
    - python >={{ python_min }}
    - yaqd-core >=2020.06.3
    - numpy
    - qtypes
    - toml
    - yaq-traits

test:
  imports:
    - yaqd_gage
  commands:
    - pip check
    - yaqd-gage-compuscope --help
    - yaqd-gage-chopping --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://yaq.fyi
  summary: yaq daemons for GaGe hardware
  dev_url: https://gitlab.com/yaq/yaqd-gage
  license: LGPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - untzag
    - ksunden
    - ddkohler
    - kameyer226
