{% set name = "yaqd-gage" %}
{% set version = "2022.7.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/yaqd-gage-{{ version }}.tar.gz
  sha256: 2d28cc4b83210dfa3a1f6ffbbd90e71c08baf9e65d3453adb6ce9e6ef1e6bba4

build:
  number: 1
  noarch: python
  entry_points:
    - yaqd-gage-compuscope = yaqd_gage._compuscope:CompuScope.main
    - yaqd-gage-chopping = yaqd_gage._chopping:CompuScope.main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - yaqd-core >=2020.06.3
    - pip
    - flit
  run:
    - python >={{ python_min }}
    - yaqd-core >=2020.06.3
    - numpy
    - qtypes
    - toml
    - yaq-traits

test:
  imports:
    - yaqd_gage
  commands:
    - pip check
    - yaqd-gage-compuscope --help
    - yaqd-gage-chopping --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://yaq.fyi
  summary: yaq daemons for GaGe hardware
  dev_url: https://gitlab.com/yaq/yaqd-gage
  license: LGPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - untzag
    - ksunden
    - ddkohler
    - kameyer226
